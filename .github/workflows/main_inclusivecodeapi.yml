name: Build and deploy ASP.Net Core app - InclusiveCodeAPI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Ou '9.0.x' se estiver usando a mais recente

      - name: Build and Publish
        run: |
          dotnet build --configuration Release
          dotnet publish -c Release -o ./publish-folder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app-payload
          path: ./publish-folder

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: web-app-payload
          path: ./ready-to-deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'InclusiveCodeAPI'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./ready-to-deploy
